<!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>화학 탐험대: 분자식과 이온식</title> <script src="https://cdn.tailwindcss.com"></script> <!-- Application Structure Plan: 1. Header & Navigation: Left sticky sidebar for easy navigation. 2. Intro Section (NEW): Introduces 3 main types of substances in nature (Elements, Molecules, Lattices) before diving into formulas. 3. Section 1 (Molecular Formula): Interactive decoder for covalent compounds. 4. Section 2 (Ionic Formula): Interactive puzzle matching cations and anions. 5. Section 3 (Comparison): Explains the fundamental difference (molecules vs lattices) and the Metal/Non-metal rule. Includes a sorting mini-game. --> <!-- Visualization & Content Choices: - Visuals are built using HTML/CSS shapes, emojis, and flex/grid layouts (NO SVG). - Sidebar uses sticky positioning and smooth scrolling. --> <style> @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap'); html { scroll-behavior: smooth; scroll-padding-top: 100px; /* Offset for sticky header */ } body { font-family: 'Noto Sans KR', sans-serif; } .atom-circle { border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); user-select: none; } .ion-btn { transition: all 0.2s ease; } .ion-btn.selected-cation { background-color: #ef4444; /* red-500 */ color: white; border-color: #ef4444; transform: scale(1.05); } .ion-btn.selected-anion { background-color: #3b82f6; /* blue-500 */ color: white; border-color: #3b82f6; transform: scale(1.05); } .lattice-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: fit-content; margin: 0 auto; } .lattice-item { width: 20px; height: 20px; border-radius: 4px; } .flip-card { perspective: 1000px; cursor: pointer; } .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; } .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); } .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; } .flip-card-back { transform: rotateY(180deg); } /* Active state for sidebar links (will be handled by simple CSS hover for now) */ .sidebar-link:hover { padding-left: 0.5rem; } /* Custom scrollbar */ ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #f1f1f1; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #94a3b8; } </style> </head> <body class="bg-slate-50 text-slate-800">
